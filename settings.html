<!-- 设置面板 (在扩展列表里显示) -->
<div class="luchen-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b style="color: #c9a0dc;">🌌 陆沉专属辅助面板</b>
            <div class="inline-drawer-icon fa-solid fa-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content" style="display: block;">
            <div class="flex-container justifySpaceBetween alignItemCenter">
                <label>开启 WIKI 自动雷达抓取</label>
                <input id="luchen_enable_wiki" type="checkbox" checked>
            </div>
            <hr>
            <div class="flex-container justifyCenter">
                <div id="luchen_open_table_btn" class="menu_button" style="background: linear-gradient(to right, #4a00e0, #8e2de2); color: white;">打开专属 WIKI 档案库</div>
            </div>
        </div>
    </div>
</div>

<!-- 隐藏的专属表格弹窗 (点击上方按钮或顶栏星星时弹出) -->
<div id="luchen_wiki_modal" style="display: none; position: fixed; top: 10%; left: 15%; width: 70%; height: 80%; background: rgba(30, 30, 35, 0.95); border: 1px solid #c9a0dc; border-radius: 10px; z-index: 9999; padding: 20px; box-shadow: 0 0 20px rgba(142, 45, 226, 0.5); overflow-y: auto; color: white;">
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #555; padding-bottom: 10px; margin-bottom: 15px;">
        <h2 style="margin: 0; color: #c9a0dc;">🌌 凤昭的专属 WIKI 档案库</h2>
        <div id="luchen_close_modal_btn" style="cursor: pointer; font-size: 20px; font-weight: bold;">❌</div>
    </div>
    
    <table style="width: 100%; border-collapse: collapse; text-align: left;">
        <thead>
            <tr style="background-color: rgba(255,255,255,0.1);">
                <th style="padding: 10px; border-bottom: 1px solid #888; width: 15%;">标签</th>
                <th style="padding: 10px; border-bottom: 1px solid #888; width: 20%;">词条名</th>
                <th style="padding: 10px; border-bottom: 1px solid #888; width: 50%;">内容描述</th>
                <th style="padding: 10px; border-bottom: 1px solid #888; width: 15%;">操作</th>
            </tr>
        </thead>
        <tbody id="luchen_wiki_table_body">
            <!-- 抓取的数据会动态塞到这里 -->
        </tbody>
    </table>
    <div style="margin-top: 20px; text-align: right;">
        <div id="luchen_clear_btn" class="menu_button" style="background-color: #8b0000; color: white; display: inline-block;">清空所有档案</div>
    </div>
</div>
